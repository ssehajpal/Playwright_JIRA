name: Scheduled Playwright Tests

on:
  schedule:
    - cron: '0 0 * * *'   # run every hour
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Debug environment
        run: |
          echo "--- Node version ---"
          node --version
          echo "--- json-server version ---"
          npx json-server --version
          echo "--- db.json contents ---"
          cat db.json
          echo "--- Current directory ---"
          pwd && ls -la

      - name: Kill anything on port 3000
        run: fuser -k 3000/tcp || true    

      - name: Start mock server
        run: npx json-server db.json --port 3000  --host 0.0.0.0 > /tmp/json-server.log 2>&1 &

      - name: Wait for mock server to be ready
        run: |
          echo "Waiting for JSON server..."
          for i in {1..15}; do
            curl -s http://127.0.0.1:3000/products && echo "✅ Server is up!" && exit 0
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "❌ Server never started"
          exit 1
      
      - name: Run Playwright tests
        run: npx playwright test  

      - name: Show server logs
        if: always()
        run: cat /tmp/json-server.log